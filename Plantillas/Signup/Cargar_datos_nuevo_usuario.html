<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar registro</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            color-scheme: light;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f4f7fb 0%, #e7eef8 100%);
            color: #1f2937;
        }

        main {
            width: min(92vw, 520px);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin-top: 0;
            font-size: clamp(1.5rem, 4vw, 2rem);
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            display: inline-block;
        }

        input[type="text"],
        button,
        .location-button {
            width: 100%;
            box-sizing: border-box;
            border-radius: 12px;
            font-size: 1rem;
        }

        input[type="text"] {
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
            background: #fff;
        }

        .location-button,
        button[type="submit"],
        .ghost-button {
            border: 0;
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 700;
        }

        .location-button {
            background: #0f766e;
            color: #fff;
            text-align: left;
        }

        .location-button[data-has-location="true"] {
            background: #14532d;
        }

        button[type="submit"] {
            background: #111827;
            color: #fff;
        }

        .ghost-button {
            background: #e2e8f0;
            color: #0f172a;
        }

        .location-status {
            min-height: 1.25rem;
            font-size: 0.92rem;
            color: #334155;
            margin: 0;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.68);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 20;
        }

        .modal.is-open {
            display: flex;
        }

        .modal-panel {
            width: min(100%, 980px);
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .modal-header strong {
            font-size: 1rem;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        #map {
            width: 100%;
            height: min(68vh, 560px);
        }
    </style>
</head>
<body>
    <main>
        <h1 id="nombre_cuenta">Bienvenido ...</h1>
        <form id="registro-form">
            <div>
                <label for="telefono">Telefono:</label>
                <input type="text" id="telefono" name="telefono" required>
            </div>

            <div>
                <label for="ubicacion-boton">Ubicacion:</label>
                <button type="button" id="ubicacion-boton" class="location-button" data-has-location="false">
                    Tocar para elegir tu ubicación en el mapa
                </button>
                <input type="hidden" id="ubicacion" name="ubicacion" required>
            </div>

            <p class="location-status" id="location-status">Aún no has elegido una ubicación.</p>
            <button type="submit">Enviar</button>
        </form>
    </main>

    <div class="modal" id="map-modal" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="map-title">
            <div class="modal-header">
                <strong id="map-title">Elige tu ubicación</strong>
                <div class="modal-actions">
                    <button type="button" id="usar-ubicacion" class="ghost-button">Usar mi ubicación actual</button>
                    <button type="button" id="cerrar-mapa" class="ghost-button">Cerrar</button>
                </div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        window.onload = () => {
            if (!sessionStorage.getItem("id_cliente_temp") || !sessionStorage.getItem("nombre_cliente_temp")) {
                return window.location.href = "/Plantillas/Signup/Login_google.html";
            }

            const nombreCuenta = document.getElementById("nombre_cuenta");
            const telefonoInput = document.getElementById("telefono");
            const ubicacionInput = document.getElementById("ubicacion");
            const ubicacionBoton = document.getElementById("ubicacion-boton");
            const locationStatus = document.getElementById("location-status");
            const form = document.getElementById("registro-form");
            const modal = document.getElementById("map-modal");
            const cerrarMapa = document.getElementById("cerrar-mapa");
            const usarUbicacion = document.getElementById("usar-ubicacion");
            const mapContainer = document.getElementById("map");

            nombreCuenta.textContent = `Bienvenido, ${sessionStorage.getItem("nombre_cliente_temp")}`;

            let map;
            let marker;
            let mapInitialized = false;

            const defaultCenter = [-34.6037, -58.3816];

            const updateLocation = (lat, lng) => {
                const value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                ubicacionInput.value = value;
                ubicacionBoton.textContent = `Ubicación elegida: ${value}`;
                ubicacionBoton.dataset.hasLocation = "true";
                locationStatus.textContent = `Pin guardado en ${value}.`;
            };

            const ensureMap = () => {
                if (mapInitialized) {
                    map.invalidateSize();
                    return;
                }

                map = L.map(mapContainer);
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                    maxZoom: 19,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(map);

                map.on("click", (event) => {
                    const { lat, lng } = event.latlng;
                    if (marker) {
                        marker.setLatLng(event.latlng);
                    } else {
                        marker = L.marker(event.latlng, { draggable: true }).addTo(map);
                        marker.on("dragend", () => {
                            const position = marker.getLatLng();
                            updateLocation(position.lat, position.lng);
                        });
                    }

                    updateLocation(lat, lng);
                });

                mapInitialized = true;
            };

            const centerMap = (lat, lng, zoom = 16) => {
                ensureMap();
                map.setView([lat, lng], zoom);
                if (marker) {
                    marker.setLatLng([lat, lng]);
                } else {
                    marker = L.marker([lat, lng], { draggable: true }).addTo(map);
                    marker.on("dragend", () => {
                        const position = marker.getLatLng();
                        updateLocation(position.lat, position.lng);
                    });
                }
                updateLocation(lat, lng);
            };

            const openMap = () => {
                modal.classList.add("is-open");
                modal.setAttribute("aria-hidden", "false");
                ensureMap();

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            centerMap(latitude, longitude);
                        },
                        () => {
                            map.setView(defaultCenter, 13);
                        },
                        { enableHighAccuracy: true, timeout: 8000 }
                    );
                } else {
                    map.setView(defaultCenter, 13);
                }
            };

            const closeMap = () => {
                modal.classList.remove("is-open");
                modal.setAttribute("aria-hidden", "true");
            };

            ubicacionBoton.addEventListener("click", openMap);
            cerrarMapa.addEventListener("click", closeMap);
            usarUbicacion.addEventListener("click", () => {
                if (!navigator.geolocation) {
                    locationStatus.textContent = "Tu navegador no soporta geolocalización.";
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        centerMap(latitude, longitude);
                        locationStatus.textContent = "Se usó tu ubicación actual.";
                    },
                    () => {
                        locationStatus.textContent = "No se pudo obtener tu ubicación actual.";
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });

            modal.addEventListener("click", (event) => {
                if (event.target === modal) {
                    closeMap();
                }
            });

            form.addEventListener("submit", (event) => {
                if (!ubicacionInput.value) {
                    event.preventDefault();
                    locationStatus.textContent = "Debes elegir una ubicación en el mapa antes de enviar.";
                    openMap();
                }
                else{
                    event.preventDefault();
                    fetch('/registrar_nuevo_usuario', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            id_cliente: sessionStorage.getItem("id_cliente_temp"),
                            nombre_cliente: sessionStorage.getItem("nombre_cliente_temp"),
                            telefono_cliente: telefonoInput.value.trim(),
                            ubicacion_cliente: ubicacionInput.value
                        })
                    })
                        .then(async (response) => {
                            const data = await response.json().catch(() => ({}));

                            if (!response.ok) {
                                throw new Error(data.error || "No se pudo registrar el usuario");
                            }

                            locationStatus.textContent = "Usuario registrado correctamente.";
                            sessionStorage.clear();
                            localStorage.clear();
                            window.location.href = "/";
                        })
                        .catch((error) => {
                            locationStatus.textContent = error.message;
                        });
                }
            });

            telefonoInput.focus();
        };
    </script>
</body>
</html>
