<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Neumorphic Dashboard & GPS Tracker</title>
    
    <!-- Tailwind CSS para la maquetación rápida -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <!-- Fuentes premium de Google (Inter para un estilo de interfaz limpio) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Iconos vectoriales nítidos (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Variables de Tema: Neumorfismo Mate Oscuro por defecto */
        :root {
            --bg-color: #17181a;
            --card-bg: #1e2022;
            --text-main: #ffffff;
            --text-muted: #8e9297;
            --accent-glow: rgba(255, 69, 0, 0.4);
            --accent-solid: #ff5722;
            --btn-shadow-out: -4px -4px 10px rgba(255, 255, 255, 0.03), 4px 4px 10px rgba(0, 0, 0, 0.5);
            --btn-shadow-in: inset -2px -2px 6px rgba(255, 255, 255, 0.02), inset 2px 2px 6px rgba(0, 0, 0, 0.6);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Variables de Tema Claro (Vidrio Claro / Neumorfismo Soft) */
        .light-theme {
            --bg-color: #e6ebf0;
            --card-bg: #f3f6f9;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --accent-glow: rgba(255, 87, 34, 0.25);
            --accent-solid: #e64a19;
            --btn-shadow-out: -4px -4px 10px rgba(255, 255, 255, 0.8), 4px 4px 10px rgba(165, 175, 190, 0.4);
            --btn-shadow-in: inset -2px -2px 6px rgba(255, 255, 255, 0.8), inset 2px 2px 6px rgba(165, 175, 190, 0.4);
            --card-shadow: 0 10px 30px rgba(165, 175, 190, 0.2);
        }

        body {
            margin: 0;
            min-height: 100dvh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        /* Estilos Neumórficos */
        .neu-card {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s ease;
        }

        .neu-btn {
            background: var(--card-bg);
            box-shadow: var(--btn-shadow-out);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-main);
        }

        .neu-btn:active, .neu-btn.active {
            box-shadow: var(--btn-shadow-in);
            transform: scale(0.97);
        }

        /* Curva Orgánica de la Barra de Navegación Inferior (Idéntica a la imagen)
           Ahora fijada abajo y por encima del contenido */
        .curved-nav-container {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent;
            width: 100%;
            height: 95px;
            margin: 0;
            z-index: 120;
            display: block;
        }

        .curved-nav-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 -5px 15px rgba(0, 0, 0, 0.15));
        }

        .curved-nav-svg path {
            fill: var(--card-bg);
            transition: fill 0.4s ease;
        }

        /* Botón Central Flotante con Brillo */
        .floating-action-container {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .floating-action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--card-bg);
            box-shadow: var(--btn-shadow-out), 0 0 15px var(--accent-glow);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .floating-action-btn:hover {
            box-shadow: var(--btn-shadow-out), 0 0 25px var(--accent-solid);
            transform: translateY(-2px);
        }

        .floating-action-btn i {
            color: var(--accent-solid);
            transition: transform 0.3s ease;
        }

        .floating-action-btn:active {
            box-shadow: var(--btn-shadow-in);
            transform: translateY(1px);
        }

        /* Luces de Estado de Navegación */
        .nav-item {
            position: relative;
        }

        .nav-item .nav-icon {
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        .nav-item.is-active .nav-icon {
            color: var(--accent-solid) !important;
        }

        .floating-action-btn .nav-icon {
            color: var(--accent-solid) !important;
        }

        .active-dot-glow {
            position: absolute;
            left: 50%;
            bottom: -6px;
            width: 5px;
            height: 5px;
            background-color: var(--accent-solid);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-solid), 0 0 15px var(--accent-solid);
            transform: translateX(-50%);
            display: none;
        }

        .nav-item.is-active .active-dot-glow {
            display: block;
        }

        .content-area {
            width: 100%;
            min-height: 46vh;
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1.25rem;
            margin-top: 0.5rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
        }

        .light-theme .content-area {
            border-color: rgba(28, 30, 33, 0.2);
            background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.45));
        }

        /* Notificación Flotante Estilizada */
        .toast-notification {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: rgba(30, 32, 34, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Personalización de scrollbar para mantener sobriedad */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--card-bg);
            border-radius: 10px;
        }

        /* Evitar que la barra inferior tape el contenido: espacio seguro */
        .mobile-fullscreen-panel {
            padding-bottom: 120px;
        }

        @media (max-width: 1023px) {
            .mobile-fullscreen-panel {
                min-height: 100dvh;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
            }
        }
    </style>
    <script src="loader-redirect.js"></script>
</head>
<body>

    <!-- Contenedor Principal -->
    <div class="min-h-screen w-full flex flex-col">
        <div class="w-full flex flex-col neu-card overflow-hidden relative mobile-fullscreen-panel lg:mx-0">
            
            <!-- Encabezado Superior de Botones Neumórficos -->
            <div class="flex justify-between items-center px-6 pt-8 pb-4">
                <div class="w-12 h-12 neu-btn" onclick="showToast('Regresando al menú principal...')">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </div>
                <div class="flex gap-4">
                    <div class="w-12 h-12 neu-btn relative" onclick="showToast('No hay nuevas alertas de telemetría')">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-3 right-3 w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span>
                    </div>
                    <!-- Botón de Configuración: Alterna Tema Claro / Oscuro Soberbio -->
                    <div class="w-12 h-12 neu-btn" id="theme-toggle" onclick="toggleTheme()" title="Cambiar Tema">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>

            <!-- Contenido Principal sin datos de prueba -->
            <div class="px-6 flex-1 flex flex-col gap-5">
                <div class="content-area">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Dashboard Principal</h1>
                        <p class="mt-3 text-sm md:text-base" style="color: var(--text-muted)">
                            Estructura limpia lista para conectar datos reales.
                        </p>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN INFERIOR: LA COPA CURVA NEUMÓRFICA EXACTA -->
            <div class="curved-nav-container mt-4">
                <svg class="curved-nav-svg" viewBox="0 0 375 95" preserveAspectRatio="none">
                    <!-- Curvatura exacta del diseño original con beziers orgánicos -->
                    <path d="M 0 25 
                             L 135 25 
                             C 152 25, 155 60, 187.5 60 
                             C 220 60, 223 25, 240 25 
                             L 375 25 
                             L 375 95 
                             L 0 95 Z" />
                </svg>

                <!-- Botón Central Flotante '+' con iluminación -->
                <div class="floating-action-container">
                    <div class="floating-action-btn" onclick="window.location.href='RealizarPedido.html'">
                        <i data-lucide="plus" class="w-7 h-7" id="plus-icon"></i>
                    </div>
                </div>

                <!-- Iconos de Navegación Distribuidos en la Curva -->
                <div class="absolute inset-0 flex justify-between items-center px-8 pt-4 z-0">
                    <!-- Home -->
                    <div class="flex flex-col items-center justify-center cursor-pointer w-10 h-10 nav-item" data-nav="home" onclick="window.location.href='inicio.html'">
                        <i data-lucide="home" class="w-5 h-5 transition-colors nav-icon"></i>
                        <span class="active-dot-glow"></span>
                    </div>

                    <!-- Zap / Energía -->
                    <div class="flex flex-col items-center justify-center cursor-pointer w-10 h-10 mr-12 nav-item" data-nav="orders" onclick="window.location.href='Pedidos.html'">
                        <i data-lucide="zap" class="w-5 h-5 transition-colors nav-icon"></i>
                        <span class="active-dot-glow"></span>
                    </div>

                    <!-- Map Pin (Activo con brillo naranja/rojo por debajo como en la foto) -->
                    <div class="flex flex-col items-center justify-center cursor-pointer w-10 h-10 ml-12 nav-item" data-nav="tracking" onclick="window.location.href='dashboardv1.html'">
                        <i data-lucide="map-pin" class="w-5 h-5 transition-colors nav-icon"></i>
                        <span class="active-dot-glow"></span>
                    </div>

                    <!-- User -->
                    <div class="flex flex-col items-center justify-center cursor-pointer w-10 h-10 nav-item" data-nav="profile" onclick="window.location.href='Perfil.html'">
                        <i data-lucide="user" class="w-5 h-5 transition-colors nav-icon"></i>
                        <span class="active-dot-glow"></span>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Toast de Notificaciones Personalizadas (Sin usar Alert de navegador) -->
    <div id="toast-notif" class="toast-notification">
        <i data-lucide="info" class="w-5 h-5 text-blue-400"></i>
        <span id="toast-message">Notificación</span>
    </div>

    <script>
        // Inicializar Iconos Lucide
        lucide.createIcons();

        const navRoutes = {
            'inicio.html': 'home',
            'Pedidos.html': 'orders',
            'dashboardv1.html': 'tracking',
            'Perfil.html': 'profile',
            'RealizarPedido.html': 'action'
        };

        const currentPage = window.location.pathname.split('/').pop() || 'inicio.html';
        const activeNav = navRoutes[currentPage];

        document.querySelectorAll('[data-nav]').forEach((item) => {
            item.classList.toggle('is-active', item.dataset.nav === activeNav);
        });

        let actionOpen = false;

        // Cargar tema guardado al iniciar la página
        function loadTheme() {
            const savedTheme = localStorage.getItem('appTheme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }

        // Aplicar tema guardado al cargar
        loadTheme();

        function toggleTheme() {
            const body = document.body;
            const hasLightTheme = body.classList.toggle('light-theme');
            localStorage.setItem('appTheme', hasLightTheme ? 'light' : 'dark');

            if (hasLightTheme) {
                showToast("Modo Claro Activado");
            } else {
                showToast("Modo Oscuro Activado");
            }
        }

        function toggleMainAction() {
            actionOpen = !actionOpen;
            const plusIcon = document.getElementById('plus-icon');
            const routeBtn = document.getElementById('route-mode-btn');

            plusIcon.style.transform = actionOpen ? 'rotate(45deg)' : 'rotate(0deg)';
            routeBtn.style.boxShadow = actionOpen
                ? 'var(--btn-shadow-in), 0 0 15px rgba(255, 69, 0, 0.6)'
                : 'var(--btn-shadow-out), 0 0 15px var(--accent-glow)';

            showToast(actionOpen ? 'Acción principal activa' : 'Acción principal cerrada');
        }

        // Notificaciones Flotantes Integradas (Sin bloquear el iFrame)
        function showToast(message) {
            const toast = document.getElementById('toast-notif');
            const msgSpan = document.getElementById('toast-message');
            msgSpan.innerText = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }
    </script>
</body>
</html>
