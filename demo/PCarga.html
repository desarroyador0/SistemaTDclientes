<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo Delivery | Cargando</title>
	<style>
		:root {
			--bg-0: #090a0c;
			--bg-1: #14161a;
			--bg-2: #1b1d22;
			--accent: #ff6a2f;
			--accent-soft: rgba(255,106,47,0.16);
			--glass: rgba(255,255,255,0.04);
			--glass-border: rgba(255,255,255,0.08);
			--text: #ffffff;
		}

		* { box-sizing: border-box; }
		html, body { height: 100%; margin: 0; }
		body {
			font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
			background:
				radial-gradient(circle at 50% 30%, rgba(255,106,47,0.22), transparent 18%),
				radial-gradient(circle at 18% 20%, rgba(255,255,255,0.035), transparent 18%),
				radial-gradient(circle at 80% 78%, rgba(255,106,47,0.12), transparent 20%),
				linear-gradient(135deg, var(--bg-0), var(--bg-1) 48%, var(--bg-2));
			color: var(--text);
			overflow: hidden;
		}
		body::before,
		body::after {
			content: "";
			position: fixed;
			inset: -20%;
			pointer-events: none;
		}

		body::before {
			background:
				radial-gradient(circle at 25% 30%, rgba(255,106,47,0.14), transparent 16%),
				radial-gradient(circle at 70% 26%, rgba(255,255,255,0.03), transparent 14%),
				radial-gradient(circle at 60% 72%, rgba(255,106,47,0.08), transparent 18%);
			filter: blur(20px);
			animation: drift 9s ease-in-out infinite alternate;
		}

		body::after {
			background-image: linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
			background-size: 56px 56px;
			opacity: 0.18;
			mask-image: radial-gradient(circle at center, black 30%, transparent 78%);
		}

		.shell {
			position: relative;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}

		.half {
			position: absolute;
			top: 0;
			width: 50vw;
			height: 100%;
			background:
				linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.012) 40%, rgba(0,0,0,0.16)),
				linear-gradient(135deg, rgba(23,24,27,0.98), rgba(13,14,16,0.96));
			transition: transform 780ms cubic-bezier(0.76, 0, 0.24, 1), opacity 780ms ease;
			will-change: transform, opacity;
		}

		.half.left {
			left: 0;
			border-right: 1px solid rgba(255,255,255,0.035);
			box-shadow: inset -24px 0 45px rgba(0,0,0,0.22);
		}

		.half.right {
			right: 0;
			border-left: 1px solid rgba(255,255,255,0.035);
			box-shadow: inset 24px 0 45px rgba(0,0,0,0.22);
		}

		.half::before,
		.half::after {
			content: "";
			position: absolute;
			border-radius: 50%;
			pointer-events: none;
		}

		.half::before {
			width: 240px;
			height: 240px;
			top: 14%;
			right: 10%;
			background: radial-gradient(circle, rgba(255,90,47,0.10), transparent 68%);
			filter: blur(12px);
		}

		.half::after {
			width: 180px;
			height: 180px;
			bottom: 12%;
			left: 12%;
			background: radial-gradient(circle, rgba(255,255,255,0.045), transparent 66%);
			filter: blur(10px);
		}

		.center {
			position: absolute;
			inset: 0;
			display: grid;
			place-items: center;
			z-index: 2;
		}

		.logo-wrap {
			position: relative;
			width: min(56vw, 260px);
			height: min(56vw, 260px);
			display: grid;
			place-items: center;
		}

		.glow {
			position: absolute;
			inset: 20%;
			border-radius: 50%;
			background: radial-gradient(circle, rgba(255,106,47,0.48), rgba(255,106,47,0.1) 44%, transparent 72%);
			filter: blur(14px);
			animation: pulse 3s ease-in-out infinite;
		}

		.orbit {
			position: absolute;
			inset: 10%;
			border-radius: 50%;
			border: 1px solid rgba(255,255,255,0.06);
			border-top-color: rgba(255,106,47,0.62);
			animation: spin 3.1s linear infinite;
		}

		.orbit.small {
			inset: 22%;
			border-color: rgba(255,106,47,0.16);
			border-top-color: rgba(255,255,255,0.18);
			animation-duration: 5.2s;
			animation-direction: reverse;
		}

		.logo {
			position: relative;
			z-index: 2;
			width: 74%;
			height: 74%;
			object-fit: contain;
			background: transparent;
			mix-blend-mode: multiply;
			isolation: isolate;
			filter: drop-shadow(0 18px 30px rgba(0,0,0,0.52)) drop-shadow(0 0 16px rgba(255,106,47,0.18));
			animation: floaty 2.8s ease-in-out infinite;
		}

		.sheen {
			position: absolute;
			inset: 23%;
			border-radius: 50%;
			background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 42%, rgba(255,106,47,0.08));
			filter: blur(7px);
			animation: drift 4.4s ease-in-out infinite alternate;
		}

		.spark {
			position: absolute;
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: var(--accent);
			box-shadow: 0 0 14px var(--accent);
			animation: blink 1.8s ease-in-out infinite;
		}

		.spark.a { top: 20%; left: 22%; }
		.spark.b { right: 18%; top: 28%; animation-delay: .35s; }
		.spark.c { bottom: 20%; right: 24%; animation-delay: .7s; }

		.loader-bar {
			position: absolute;
			bottom: 11%;
			left: 50%;
			transform: translateX(-50%);
			width: min(44vw, 240px);
			height: 4px;
			border-radius: 999px;
			background: rgba(255,255,255,0.05);
			overflow: hidden;
		}

		.loader-bar::before {
			content: "";
			display: block;
			width: 38%;
			height: 100%;
			border-radius: inherit;
				background: linear-gradient(90deg, transparent, var(--accent), transparent);
			box-shadow: 0 0 10px var(--accent);
			animation: sweep 1.2s ease-in-out infinite;
		}

		.caption {
			position: absolute;
			bottom: 18%;
			left: 50%;
			transform: translateX(-50%);
			font-size: 0.78rem;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: rgba(255,255,255,0.38);
		}

		body.leaving .half.left {
			transform: translateX(-100%);
			opacity: 0;
		}

		body.leaving .half.right {
			transform: translateX(100%);
			opacity: 0;
		}

		body.leaving .logo-wrap {
			transform: scale(0.92);
			opacity: 0;
			transition: transform 420ms ease, opacity 420ms ease;
		}

		@keyframes spin { to { transform: rotate(360deg); } }
		@keyframes pulse { 0%,100% { transform: scale(0.96); opacity: 0.78; } 50% { transform: scale(1.04); opacity: 1; } }
		@keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
		@keyframes drift { 0% { transform: translateX(-4px) scale(1); } 100% { transform: translateX(4px) scale(1.02); } }
		@keyframes blink { 0%,100% { transform: scale(0.88); opacity: .45; } 50% { transform: scale(1.2); opacity: 1; } }
		@keyframes sweep { 0% { transform: translateX(-140%); } 100% { transform: translateX(340%); } }

		@media (prefers-reduced-motion: reduce) {
			*, *::before, *::after { animation: none !important; transition-duration: 1ms !important; }
		}
	</style>
</head>
<body>
	<div class="shell">
		<div class="half left"></div>
		<div class="half right"></div>

		<div class="center" aria-live="polite">
			<div class="logo-wrap">
				<div class="glow" aria-hidden="true"></div>
				<div class="orbit" aria-hidden="true"></div>
				<div class="orbit small" aria-hidden="true"></div>
				<div class="sheen" aria-hidden="true"></div>
				<div class="spark a" aria-hidden="true"></div>
				<div class="spark b" aria-hidden="true"></div>
				<div class="spark c" aria-hidden="true"></div>
				<img src="LogoTD.png" alt="Logo Todo Delivery" class="logo">
				<div class="loader-bar" aria-hidden="true"></div>
			</div>
		</div>
	</div>

	<script>
		(function(){
			function getParam(name){
				try {
					const url = new URL(location.href);
					return url.searchParams.get(name);
				} catch (error) {
					return null;
				}
			}

			const raw = getParam('to');
			const destination = raw ? decodeURIComponent(raw) : 'Registro.html';
			const entranceDelay = 1050;
			const exitDelay = 620;

			setTimeout(function(){
				document.body.classList.add('leaving');
				setTimeout(function(){
					try {
						const currentFile = (location.pathname.split('/').pop() || '').toLowerCase();
						const destinationFile = (destination.split('/').pop() || '').toLowerCase();
						if (currentFile && currentFile === destinationFile) return;
						location.href = destination;
					} catch (error) {
						location.href = destination;
					}
				}, exitDelay);
			}, entranceDelay);
		})();
	</script>
</body>
</html>
