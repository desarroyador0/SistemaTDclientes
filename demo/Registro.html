<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>Registro — SistemaTDclientes</title>
  <style>
    :root{--bg-1:#17181a;--bg-2:#101113;--card:#1e2022;--card-soft:rgba(255,255,255,0.03);--muted:#8e9297;--accent:#ff5722;--accent-soft:rgba(255,87,34,0.14)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;background:linear-gradient(180deg,var(--bg-1),var(--bg-2));color:#fff;font-family:'Inter',sans-serif;display:grid;place-items:center;overflow:hidden;padding:16px;-webkit-tap-highlight-color:transparent}

    /* Floating subtle orbs */
    body::before{content:'';position:absolute;inset:-20% -10%;background-image:radial-gradient(circle at 20% 30%, rgba(255,87,34,0.10), transparent 8%),radial-gradient(circle at 80% 80%, rgba(255,255,255,0.03), transparent 8%);pointer-events:none}

    .hero{width:100%;display:grid;place-items:center}
    .card{width:min(100%,440px);background:var(--card);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:28px;padding:24px 20px 22px;box-shadow:0 10px 30px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.03);text-align:center;transform:translateY(18px);opacity:0;transition:transform .6s cubic-bezier(.2,.9,.2,1),opacity .6s}

    .entered .card{transform:none;opacity:1}

    .logo{width:88px;height:auto;margin:0 auto 10px;border-radius:14px;background:rgba(255,255,255,0.01);padding:8px;display:inline-block}
    .title{font-weight:800;font-size:clamp(1.2rem,4vw,1.45rem);margin:8px 0 4px;letter-spacing:-0.02em}
    .subtitle{color:var(--muted);margin:0 auto 16px;font-size:0.95rem;line-height:1.45;max-width:28ch}

    .btn-google{position:relative;width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 16px;border-radius:18px;background:var(--card-soft);border:1px solid rgba(255,255,255,0.04);cursor:pointer;color:#fff;font-weight:800;font-size:0.98rem;box-shadow:0 10px 30px rgba(0,0,0,0.5),0 0 15px rgba(255,87,34,0.10);transition:transform .18s ease,box-shadow .18s;text-align:center;min-height:54px;overflow:hidden}
    .btn-google:hover{transform:translateY(-4px);box-shadow:0 16px 35px rgba(0,0,0,0.58),0 0 24px rgba(255,87,34,0.18);--sheen-x:120%}
    .btn-google::after{content:'';position:absolute;left:-40%;top:0;height:100%;width:40%;background:linear-gradient(90deg,rgba(255,255,255,0.16),rgba(255,255,255,0.02));transform:skewX(-18deg) translateX(var(--sheen-x, -6px));transition:transform .6s ease;opacity:0.9}
    .btn-google:active{transform:translateY(-1px) scale(.995)}
    .btn-google:focus{outline:2px solid rgba(255,107,61,0.18);outline-offset:4px}
    .btn-google .google-icon{flex:0 0 auto;display:block}
    .btn-google .google-text{display:block;white-space:normal;line-height:1.1}

    .small{color:var(--muted);font-size:0.9rem;margin-top:14px}

    .loader{display:flex;justify-content:center;gap:8px;margin:6px 0 18px;opacity:1;transition:opacity .4s}
    .loader.hidden{opacity:0;pointer-events:none}
    .loader span{width:9px;height:9px;border-radius:999px;background:var(--accent);animation:blink 1s infinite;box-shadow:0 0 10px var(--accent-soft)}
    .loader span:nth-child(2){animation-delay:0.12s}
    .loader span:nth-child(3){animation-delay:0.24s}
    @keyframes blink{0%{opacity:.15;transform:scale(.85)}50%{opacity:1;transform:scale(1.12)}100%{opacity:.15;transform:scale(.85)}}

    /* Responsive tweaks */
    @media (max-width:520px){.card{padding:18px 16px 18px;border-radius:20px}.logo{width:72px}.btn-google{font-size:0.94rem;padding:13px 14px;min-height:52px}}

    /* Respect reduced motion */
    @media (prefers-reduced-motion:reduce){
      .card,.btn-google{transition:none}
      .loader span{animation:none}
    }
  </style>
</head>
<body>
  <main class="hero" role="main">
    <div class="card">
      <img src="LogoTD.png" alt="Logo" class="logo" />
      <h1 class="title">SistemaTDclientes</h1>
      <p class="subtitle">Accede con tu cuenta de Google para continuar</p>

      <div class="loader" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>

      <button id="signInBtn" class="btn-google" aria-label="Iniciar sesión con Google">
        <svg class="google-icon" viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg" width="20" height="20" aria-hidden="true"><path fill="#ffffff" d="M533.5 278.4c0-17.4-1.5-34-4.4-50.2H272v95.1h146.9c-6.3 34-25 62.8-53.4 82l86.5 67.1c50.6-46.6 81.5-115.4 81.5-193z"/></svg>
        <span class="google-text">Iniciar sesión con Google</span>
      </button>

      <p class="small">¿No tienes cuenta? Contacta con el administrador.</p>
    </div>
  </main>
<script type="module">
// Módulo seguro: maneja la ausencia de `supab_publico.js` y evita errores fatales.
document.addEventListener('DOMContentLoaded', ()=>{
  const signBtn = document.getElementById('signInBtn');
  const loader = document.querySelector('.loader');

  // Entrada suave de la tarjeta
  requestAnimationFrame(()=> document.body.classList.add('entered'));

  // Ocultar loader y activar botón
  setTimeout(()=>{
    if(loader) loader.classList.add('hidden');
    if(signBtn) signBtn.classList.add('visible');
  }, 900);

    if(signBtn){
      signBtn.addEventListener('mouseenter', ()=> signBtn.style.transform = 'translateY(-3px)');
      signBtn.addEventListener('mouseleave', ()=> signBtn.style.transform = 'translateY(0)');
    }

  const logo = document.querySelector('.logo');
  if(logo){
    logo.addEventListener('click', ()=>{
      logo.animate([
        {transform: 'scale(1)'},
        {transform: 'scale(1.08)'},
        {transform: 'scale(1)'}
      ], {duration:420, easing:'cubic-bezier(.2,.8,.2,1)'});
    });
  }
});

let supabaseClient = null;
async function tryLoadSupabase(){
  try {
    const mod = await import('./supab_publico.js');
    supabaseClient = mod.default || mod.supabase || mod.supabaseClient || mod;
  } catch (e){
    console.warn('supab_publico.js no encontrado o falló la importación:', e);
  }
}

await tryLoadSupabase();

// Manejo de sesión si Supabase está disponible
async function handleExistingUser(){
  if(!supabaseClient || !supabaseClient.auth || typeof supabaseClient.auth.getUser !== 'function') return;
  try {
    const { data: { user } = {} } = await supabaseClient.auth.getUser();
    if(!user) return;

    const id_usu = user.id;
    let cliente = null;
    try {
      const res = await supabaseClient.from('Cliente').select('*').eq('ID_Cliente', id_usu).maybeSingle();
      cliente = res.data;
      if(res.error) console.warn('Supabase select Cliente:', res.error);
    } catch(e){ console.warn(e); }

    if(!cliente){
      const telef = await registerPhoneIfMissing(localStorage.getItem('telefono_cliente'));
      if(telef === null){ alert('Registro cancelado. Se requiere teléfono para crear el usuario.'); return; }

      const nombre = user?.user_metadata?.full_name || user?.user_metadata?.fullName || user?.user_metadata?.name || 'Sin nombre';

      const resp = await fetch('/registrar_nuevo_usuario', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id_cliente: user.id, nombre_cliente: nombre, telefono_cliente: telef })
      }).catch(()=>({ok:false}));

      if(resp && resp.ok){
        localStorage.setItem('telefono_cliente', telef);
        localStorage.setItem('id_cliente', user.id);
        localStorage.setItem('nombre_cliente', nombre);
        window.location.href = '/Plantillas/Dashboard_SPA.html';
      }
      return;
    }

    // Usuario ya registrado
    sessionStorage.clear();
    localStorage.setItem('id_cliente', cliente.ID_Cliente);
    localStorage.setItem('nombre_cliente', cliente.Nombre);
    localStorage.setItem('telefono_cliente', cliente.Telef);
    localStorage.setItem('fecha_union_cliente', cliente.F_creacion);
    window.location.href = '/Plantillas/Dashboard_SPA.html';

  } catch(e){
    console.warn('Error en flujo de usuario existente:', e);
  }
}

handleExistingUser();

async function registerPhoneIfMissing(existingPhone = null){
  const stored = (existingPhone || localStorage.getItem('telefono_cliente') || '').toString().trim();
  if (stored) return stored;

  while (true) {
    const input = prompt('Por favor, introduce tu teléfono (solo números):');
    if (input === null) return null;
    const telefono = input.trim();
    if (/^[0-9+\- ]{6,20}$/.test(telefono)) return telefono;
    alert('Número no válido. Introduce entre 6 y 20 caracteres numéricos, + o - permitidos.');
  }
}

// Click en botón: si Supabase está presente, iniciar OAuth; si no, informar al administrador.
const signBtnEl = document.getElementById('signInBtn');
if(signBtnEl){
  signBtnEl.addEventListener('click', async () => {
    if(!supabaseClient || !supabaseClient.auth || typeof supabaseClient.auth.signInWithOAuth !== 'function'){
      alert('Proveedor de autenticación no configurado. Contacta al administrador.');
      return;
    }

    try{
      const { data, error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: '/' } });
      if(error) { alert('Error al iniciar sesión con Google: ' + (error.message || error)); return; }
      if(data?.url) window.location.href = data.url;
      else alert('Error al generar URL de OAuth');
    } catch(e){ alert('Error al iniciar autenticación: ' + e.message); }
  });
}
</script>
</body>
</html>
